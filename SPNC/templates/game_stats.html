<!DOCTYPE html>
<html>
<head>
    <title>Thống kê game</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white p-10">

<h1 class="text-2xl mb-6">📊 Thống kê Game</h1>

<div class="bg-slate-800 p-6 rounded">

    <p>🎮 Game ID: {{ game_id }}</p>

    <p class="mt-4 text-green-400">
        ✔ Số học sinh làm đúng: {{ correct_count }}
    </p>

    <p class="text-yellow-400">
        📌 Tổng lượt làm: {{ total_attempt }}
    </p>

</div>

</body>
</html>
