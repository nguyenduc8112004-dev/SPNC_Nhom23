<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-900 flex justify-center items-center h-screen">

<div class="bg-slate-800 p-8 rounded-xl w-96">

<h2 class="text-white text-2xl mb-4">
Đăng nhập
</h2>



{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}

<div class="
p-2 mb-3 rounded
{% if category=='success' %}
bg-green-500
{% else %}
bg-red-500
{% endif %}
text-white">

{{message}}

</div>

{% endfor %}
{% endif %}
{% endwith %}

<form method="POST">

<input 
name="username"
placeholder="Tên đăng nhập"
class="w-full p-2 mb-3 rounded">

<input 
type="password"
name="password"
placeholder="Mật khẩu"
class="w-full p-2 mb-3 rounded">

<button
class="bg-indigo-500 w-full p-2 text-white rounded">
Đăng nhập
</button>

</form>

<div class="mt-3">

<a href="/register" class="text-indigo-400">
Chưa có tài khoản? Đăng ký
</a>

</div>

</div>

</body>
</html>
