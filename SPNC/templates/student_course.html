<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khóa học</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }

        .topic-card {
            border-left: 4px solid #6366f1;
        }

        .lesson-card {
            transition: all 0.2s ease;
        }

        .lesson-card:hover {
            transform: translateX(6px);
            background: #334155;
        }
    </style>
</head>

<body class="text-white p-10">


<div class="text-center mb-10">
    <h1 class="text-4xl font-bold">📘 Khóa học</h1>
    <p class="text-slate-300 mt-2">
        Chọn chủ đề và bắt đầu học 🚀
    </p>
</div>


<div class="space-y-8 max-w-4xl mx-auto">

    {% for topic in topics %}

    <div class="topic-card bg-slate-800 p-6 rounded-2xl shadow-lg">

        
        <h2 class="text-2xl font-bold mb-4 text-indigo-300">
            📂 {{ topic.title }}
        </h2>

        
        <div class="space-y-3">

            {% for lesson in lessons_by_topic[topic.id] %}

            <div class="lesson-card bg-slate-700 p-4 rounded-xl cursor-pointer flex justify-between items-center"
                 onclick="location.href='/lesson/{{ lesson.id }}'">

                
                <div>
                    <p class="text-lg font-semibold">
                        📖 {{ lesson.title }}
                    </p>

                    <p class="text-sm text-slate-300">
                        🎯 Nhận {{ lesson.xp_reward }} XP
                    </p>
                </div>

                
                <div class="text-sm bg-indigo-500 px-3 py-1 rounded-full">
                    Vào học ▶
                </div>

            </div>

            {% endfor %}

        </div>

    </div>

    {% endfor %}

</div>

</body>
</html>
